<div class="mat-elevation-z2 overflow-auto">
  <table mat-table class="full-width-table" matSort aria-label="Elements">
    <!-- Dynamic Column Definitions -->
    @for (column of columns; track $index) {
      <ng-container [matColumnDef]="column.header">
        <!-- Centramos todos los headers -->
        <th mat-header-cell *matHeaderCellDef>
           <div class="flex justify-center items-center text-sm font-semibold">
            {{ column.header }}
          </div>
        </th>

        <td mat-cell *matCellDef="let element" class="text-center">
          @if(column.header === 'Gestionar') {
            <div class="flex items-center justify-center gap-2 flex-wrap">
              <app-generic-button *ngIf="editable"
                icon="edit_square"
                (buttonClick)="onEdit(element[idModel])"
                class="accent rounded-full text-base w-8 h-8"
              ></app-generic-button>
              <app-generic-button *ngIf="displayable"
                icon="visibility"
                (buttonClick)="onView(element[idModel])"
                class="neutral rounded-full text-base w-8 h-8"
              ></app-generic-button>
              <app-generic-button *ngIf="deletable"
                icon="delete"
                (buttonClick)="onDelete(element[idModel])"
                class="warn rounded-full text-base w-8 h-8"
              ></app-generic-button>
            </div>
          } @else {
           <div class="text-center">
              {{ getCellValue(element, column) }}
            </div>
          }
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator class="w-full" #paginator [length]="dataSource.data.length" [pageIndex]="0"
    [pageSize]="10" [pageSizeOptions]="[5, 10, 20]" aria-label="Select page">
  </mat-paginator>
</div>
